name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Determine version bump from merged PR
        id: bump
        uses: actions/github-script@v7
        with:
          script: |
            // Find the PR whose merge commit matches this push
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              base: 'main',
              sort: 'updated',
              direction: 'desc',
              per_page: 10,
            });

            const pr = prs.find(p => p.merged_at && p.merge_commit_sha === context.sha);

            if (!pr) {
              core.info('No merged PR found for this push — defaulting to patch bump.');
              core.setOutput('type', 'patch');
              return;
            }

            core.info(`Found PR #${pr.number}: ${pr.title}`);
            const body = pr.body ?? '';

            // Match checked checkboxes: - [x] `major`, - [x] `minor`, default to patch
            if (/^- \[x\] `?major`?/im.test(body)) {
              core.info('Version bump: major');
              core.setOutput('type', 'major');
            } else if (/^- \[x\] `?minor`?/im.test(body)) {
              core.info('Version bump: minor');
              core.setOutput('type', 'minor');
            } else {
              core.info('Version bump: patch (default)');
              core.setOutput('type', 'patch');
            }

      - name: Get latest release tag
        id: latest
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data: release } = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              core.info(`Latest release tag: ${release.tag_name}`);
              core.setOutput('tag', release.tag_name);
            } catch (err) {
              // 404 means no releases yet — start from v0.0.0
              core.info(`No existing release found (${err.message}) — starting from v0.0.0`);
              core.setOutput('tag', 'v0.0.0');
            }

      - name: Compute next version
        id: version
        env:
          LATEST_TAG: ${{ steps.latest.outputs.tag }}
          BUMP_TYPE: ${{ steps.bump.outputs.type }}
        run: |
          # Validate and normalise the tag — fall back to v0.0.0 if unexpected format
          if [[ ! "$LATEST_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${LATEST_TAG}' does not match vMAJOR.MINOR.PATCH — falling back to v0.0.0"
            LATEST_TAG="v0.0.0"
          fi

          TAG="${LATEST_TAG#v}"
          MAJOR=$(echo "$TAG" | cut -d. -f1)
          MINOR=$(echo "$TAG" | cut -d. -f2)
          PATCH=$(echo "$TAG" | cut -d. -f3)

          # Stay on v0.*.* for now — major bump is reserved for the future
          if [ "$BUMP_TYPE" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP_TYPE" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: ${NEW_TAG}"
          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: actions/github-script@v7
        env:
          NEW_TAG: ${{ steps.version.outputs.tag }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.NEW_TAG;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              target_commitish: context.sha,
              generate_release_notes: true,
            });
            core.info(`Created release ${tag}`);
